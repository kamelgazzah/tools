<script>
    hijriholiday = [];
    const days = ["الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت", "الأحد"];
    const nbdays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    const months = [
        "جانفي",
        "فيفري",
        "مارس",
        "أبريل",
        "ماي",
        "جوان",
        "جويلية",
        "أوت",
        "سبتمبر",
        "أكتوبر",
        "نوفمبر",
        "ديسمبر",
    ];
    const elyoum = new Date();

    let cday = elyoum.getDate();
    let cmonth = elyoum.getMonth() + 1;
    let cyear = elyoum.getFullYear();
    const holidays = [
        {
            country: "Tunisia",
            label: "رأس السنة الميلادية",
            m: "1",
            d: "1"
        },
        {
            country: "Tunisia",
            label: "عيد الاستقلال",
            m: "3",
            d: "20"
        }, {
            country: "Tunisia",
            label: "عيد الشهداء",
            m: "4",
            d: "9"
        }, {
            country: "Tunisia",
            label: "عيد العمال",
            m: "5",
            d: "1"
        }, {
            country: "Tunisia",
            label: "عيد الجمهورية",
            m: "7",
            d: "25"
        }, {
            country: "Tunisia",
            label: "عيد الثورة",
            m: "12",
            d: "17"
        }, {
            country: "Algeria",
            label: "New Year day",
            m: "1",
            d: "1"
        }, {
            country: "Algeria",
            label: "Amazigh New Year(Yennayer)",
            m: "1",
            d: "12"
        }, {
            country: "Algeria",
            label: "Labour Day",
            m: "5",
            d: "1"
        }, {
            country: "Algeria",
            label: "Independence Day",
            m: "7",
            d: "5"
        }, {
            country: "Algeria",
            label: "Revolution Day",
            m: "11",
            d: "1"
        }];



    function getmyDay(d) {
        let date = new Date(d);
        const date0 = new Date("10/15/1582");
        const date1 = new Date("10/4/1582");
        let ret = 0;
        if (date instanceof Date && !isNaN(date)) {
            if (date < date0 && date > date1) {
                ret = undefined;
            } else if ((date) => date0) {
                ret = date.getDay();
            } else if (date <= date1) {
                ret = (date.getDay() + 3) % 7;
            }
        } else {
            ret = undefined;
        }
        return ret;
    }

    function cal(m, y) {
        let gregorianDate = '';
        let title = '';
        if (y % 4 == 0 && !(y % 100 == 0 && y % 400 != 0)) {
            nbdays[1] = 29;
        }
        let dat1 = new Date(m + "/" + "28" + "/" + y);
        let d1 = dat1.getDay();
        t = document.getElementById("t" + m);
        tr = document.createElement("tr");
        for (let i = 0; i <= 6; i++) {
            th = document.createElement("th");
            th.innerHTML = days[i];
            tr.appendChild(th);
        }
        t.appendChild(tr);
        for (let j = 0; j <= 5; j++) {
            tr = document.createElement("tr");
            for (let i = 0; i <= 6; i++) {
                let v = "";
                if (i >= d1 || j > 0) {
                    v = i - d1 + 1 + j * 7;
                }
                var ramadan = false;
                if (v <= nbdays[m - 1] && !(y == 1582)) {
                    td = document.createElement("td");
                    if (v) {
                        gregorianDate = v + '/' + m + '/' + y;
                        var dateHijri = HijriJS.toHijri(gregorianDate, "/").toString();
                        //console.log('gregorian/hijri::', gregorianDate + '**' + dateHijri + '___' + dateHijri.slice(3, 5));
                        //console.log('::', dateHijri + '**' + dateHijri.slice(0, 5))


                        if (dateHijri.slice(3, 5) == '09') {
                            ramadan = true;
                        } else {
                            ramadan = false;
                        }
                    } //new Date(y, m, v);
                    else {
                        var dateHijri = '';
                    }







                    if (y == cyear && m == cmonth && v == cday) {
                        td.style.backgroundColor = "violet";
                        title = 'Today';
                        td.style.color = "white";
                    }
                    if (i == 6 || i == 5) {
                        td.style.backgroundColor = "gold";
                        title = 'WekEnd';
                    }

                    const found = holidays.find(
                        (element) => element.country == document.getElementById('mycountry').value && element.m == m && element.d == v
                    );




                    if (found) {
                        td.style.backgroundColor = "red";
                        title = found.label; //'Holiday';
                    }
                    if (ramadan) {
                        td.style.backgroundColor = "#32CD32";
                        title = 'Ramadan'
                    }
                    if (dateHijri.slice(0, 5) == '01/01') {

                        title = "رأس السّنة الهجريّة";
                        hijriholiday.push({ "title": "رأس السّنة الهجريّة", "date": gregorianDate });
                    }
                    if (dateHijri.slice(0, 5) == '01/10') {

                        title = 'عيد الفطر';
                        hijriholiday.push({ "title": "عيد الفطر", "date": gregorianDate });
                    }
                    if (dateHijri.slice(0, 5) == '10/12') {
                        title = "عيد الإضحى";
                        hijriholiday.push({ "title": "عيد الإضحى", "date": gregorianDate });
                    }
                    if (dateHijri.slice(0, 5) == '12/03') {
                        title = "المولد النّبوي";
                        hijriholiday.push({ "title": "المولد النّبوي", "date": gregorianDate });
                    }

                    if (dateHijri.slice(0, 5) == '10/01' && document.getElementById('mycountry').value == 'Algeria') {
                        title = "عاشوراء";
                        hijriholiday.push({ "title": "عاشوراء", "date": gregorianDate });
                    }

                    if (dateHijri.slice(0, 5) == '01/10' || dateHijri.slice(0, 5) == '01/01' || dateHijri.slice(0, 5) == '10/12' || dateHijri.slice(0, 5) == '12/03') {
                        td.style.backgroundColor = "pink";
                    }


                    td.innerHTML = v;

                    tr.appendChild(td);
                }
            }
            t.appendChild(tr);
        }
        //console.log('hijri holidays::', hijriholiday);
    }
    const clear = () => {
        for (let i = 1; i <= 12; i++) {
            document.getElementById("t" + i).innerHTML =
                '<tr><th colspan="7">' + months[i - 1] + "</th></tr>";
        }
        hijriholiday = [];
    };
    const Cal = () => {
        if (document.getElementById('mycountry').value && document.getElementById('mycountry').value != '0') {
            if (document.getElementById("iY").value == '') {
                document.getElementById("iY").value = new Date().getFullYear();
            }
            y = document.getElementById("iY").value;
            clear();
            for (let m = 1; m <= 12; m++) {
                cal(m, y);
            }
            showHolidays(document.getElementById('mycountry').value, document.getElementById("iY").value, 'holidays');
            showHijriHolidays('hijriholidays');
            document.getElementById("taqwim").innerHTML = "التّقويم السّنوي لسنة " + y;
        }
    };

    function convertDateMDYtoDMY(dateStr) {
        // dateStr attendu au format "m/d/yyyy"
        console.log('dateStr::', dateStr);
        if (typeof dateStr !== 'string') {
            dateStr = dateStr.textContent;
        }
        if (!dateStr) {
            return "";
        }

        const parts = dateStr.split('/'); // ["m", "d", "yyyy"]
        console.log('parts::', parts);

        if (parts) {
            if (parts.length !== 3) {
                throw new Error("Format de date invalide, attendu m/d/yyyy");
            }
            const [month, day, year] = parts;
            console.log('output::', `${day}/${month}/${year}`);
            return `${day}/${month}/${year}`; // retourne "d/m/yyyy"
        }
        return "";
    }

    // Fonction pour afficher holidays grégoriens
    function showHolidays(country, year, idholidays) {
        const container = document.getElementById(idholidays);
        container.innerHTML = "";

        const table = document.createElement("table");
        table.style.borderCollapse = "collapse";

        holidays
            .filter(h => h.country === country)
            .forEach(h => {
                const tr = document.createElement("tr");

                const tdLabel = document.createElement("td");
                tdLabel.textContent = h.label;
                tdLabel.style.border = "1px solid #ccc";
                tdLabel.style.padding = "5px";

                const tdDate = document.createElement("td");
                tdDate.textContent = convertDateMDYtoDMY(`${h.m}/${h.d}/${year}`);
                tdDate.style.border = "1px solid #ccc";
                tdDate.style.padding = "5px";


                tr.appendChild(tdDate);
                tr.appendChild(tdLabel);
                table.appendChild(tr);
            });

        container.appendChild(table);
    }

    function showHijriHolidays(idholidays) {
        const container = document.getElementById(idholidays);
        container.innerHTML = "";

        const table = document.createElement("table");
        table.style.borderCollapse = "collapse";

        hijriholiday.forEach(h => {
            const tr = document.createElement("tr");

            const tdDate = document.createElement("td");
            tdDate.textContent = h.date;
            tdDate.style.border = "1px solid #ccc";
            tdDate.style.padding = "5px";

            const tdLabel = document.createElement("td");
            tdLabel.textContent = h.title;
            tdLabel.style.border = "1px solid #ccc";
            tdLabel.style.padding = "5px";




            tr.appendChild((tdDate));
            tr.appendChild(tdLabel);
            table.appendChild(tr);
        });

        container.appendChild(table);
    }





    Cal();

</script>
